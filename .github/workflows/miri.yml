# Executes Undefined Behavior (UB) analysis across the workspace.
# Validates unsafe block contracts, strict provenance, and detects memory leaks.
name: Miri

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ub-analysis:
    name: Interpreter Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      # Miri requires the nightly toolchain to hook into rustc internals.
      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      
      # Runs the test suite under the Miri interpreter.
      # Hardware-specific FFI (VirtualAlloc) and JIT machine code execution 
      # are bypassed via #[cfg(miri)] to allow pure logic validation.
      - name: Execute Miri Tests
        run: cargo +nightly miri test --workspace